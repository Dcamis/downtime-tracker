name: Weekly Downtime Reminder

on:
  schedule:
    - cron: '0 14 * * 1'  # Every Monday at 7:00 AM Pacific (14:00 UTC)
  workflow_dispatch:       # Allow manual trigger from GitHub

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Send weekly reminder email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.office365.com
          server_port: 587
          secure: false
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Weekly Reminder — Log your Downtime (LB 212)"
          to: ${{ secrets.MAIL_USERNAME }}
          from: Downtime Tracker <${{ secrets.MAIL_USERNAME }}>
          html_body: |
            <div style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;max-width:480px;margin:0 auto;padding:24px;color:#1a1a1a">
              <h2 style="font-size:18px;font-weight:600;margin-bottom:8px">Weekly Downtime Reminder</h2>
              <p style="font-size:14px;color:#6b6b6b;margin-bottom:20px">This is your Monday reminder to log any outstanding downtime entries for LB 212.</p>

              <a href="https://dcamis.github.io/downtime-tracker"
                 style="display:inline-block;padding:12px 24px;background:#1a1a1a;color:#ffffff;text-decoration:none;border-radius:8px;font-size:15px;font-weight:500">
                Open Downtime Tracker
              </a>

              <div style="margin-top:28px;padding-top:20px;border-top:1px solid #eeece8">
                <p style="font-size:12px;color:#9a9a9a">
                  KPI Target: 100 hrs per period<br>
                  Alert threshold: 80 hrs (80%)<br>
                  This email is sent every Monday at 7:00 AM Pacific.
                </p>
              </div>
            </div>
